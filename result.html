<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Proposal</title>

<!-- ✅ GitHub Pages CSS -->
<link rel="stylesheet" href="/proposal_generator/style.css">

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<!-- Background -->
<canvas id="network"></canvas>

<div class="glass-card wide">

<h2>🚀 Generated Proposal</h2>

<button onclick="downloadPDF()" class="neon-btn">
Download PDF
</button>

<div id="output"></div>

</div>

<script>

const output = document.getElementById("output");

// =====================================
// LOAD PROPOSAL
// =====================================

const storedProposal = localStorage.getItem("proposal");

let proposal = null;

if (!storedProposal) {

    output.innerHTML = `
        <p style="color:orange">
        ⚠ No proposal found.<br>
        Please generate again.
        </p>
    `;

} else {

    proposal = JSON.parse(storedProposal);

    output.innerHTML = `
        <h3>Executive Summary</h3>
        ${marked.parse(proposal.executive_summary || "")}

        <h3>Technical Approach</h3>
        ${marked.parse(proposal.technical_approach || "")}

        <h3>Timeline</h3>
        ${marked.parse(proposal.timeline || "")}

        <h3>Risk Assessment</h3>
        ${marked.parse(proposal.risk_assessment || "")}

        <h3>Estimated Cost</h3>

        <div class="cost-grid">

            <div class="cost-card">
            Development<br>
            $${proposal.estimated_cost?.development_cost ?? 0}
            </div>

            <div class="cost-card">
            Infrastructure<br>
            $${proposal.estimated_cost?.infrastructure_cost ?? 0}
            </div>

            <div class="cost-card">
            Contingency<br>
            $${proposal.estimated_cost?.contingency ?? 0}
            </div>

            <div class="cost-card total">
            Total<br>
            $${proposal.estimated_cost?.total_estimated_cost ?? 0}
            </div>

        </div>
    `;
}


// =====================================
// ✅ FIXED PDF EXPORT
// =====================================

function downloadPDF() {

    if (!proposal) {
        alert("No proposal available");
        return;
    }

    // ✅ create clean printable content
    const pdfContent = document.createElement("div");

    pdfContent.style.padding = "20px";
    pdfContent.style.fontFamily = "Arial";

    pdfContent.innerHTML = `
        <h1>AI Generated Proposal</h1>

        <h2>Executive Summary</h2>
        <p>${proposal.executive_summary}</p>

        <h2>Technical Approach</h2>
        <p>${proposal.technical_approach}</p>

        <h2>Timeline</h2>
        <p>${proposal.timeline}</p>

        <h2>Risk Assessment</h2>
        <p>${proposal.risk_assessment}</p>

        <h2>Estimated Cost</h2>

        <ul>
            <li>Development: $${proposal.estimated_cost?.development_cost ?? 0}</li>
            <li>Infrastructure: $${proposal.estimated_cost?.infrastructure_cost ?? 0}</li>
            <li>Contingency: $${proposal.estimated_cost?.contingency ?? 0}</li>
            <li><b>Total: $${proposal.estimated_cost?.total_estimated_cost ?? 0}</b></li>
        </ul>
    `;

    html2pdf()
        .set({
            margin: 10,
            filename: "AI_Proposal.pdf",
            html2canvas: { scale: 2 },
            jsPDF: {
                unit: "mm",
                format: "a4",
                orientation: "portrait"
            }
        })
        .from(pdfContent)
        .save();
}

</script>

<!-- Background Animation -->
<script src="/proposal_generator/app.js"></script>

</body>
</html>
