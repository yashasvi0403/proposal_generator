<!DOCTYPE html>
<html>
<head>
  <title>Create Proposal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="glass-card">
  <h2>🧠 Build Your Proposal</h2>

  <input id="title" placeholder="Project Title">
  <input id="industry" placeholder="Industry">
  <input id="duration" type="number" placeholder="Duration (months)">
  <input id="users" type="number" placeholder="Expected Users">
  <input id="tech" placeholder="Tech Stack (comma separated)">

<button onclick="generate()">Generate with AI</button>
<div id="loader" class="loader hidden"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
